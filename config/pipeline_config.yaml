# Pipeline Configuration
#
# Two workflows (auto-detected by PDF type):
#   Digital PDF  → PyMuPDF text/style extraction + Gemini visual correction
#   Scanned PDF  → Upstage Document Parse (OCR) + Gemini visual correction
#
# Required API keys (set as environment variables):
#   UPSTAGE_API_KEY  – for scanned/image PDFs
#   GEMINI_API_KEY   – for visual correction (both workflows)

pipeline:
  dpi: 300
  output_formats:
    - html
    - markdown

# Upstage Document Parse (scanned PDF OCR)
upstage:
  mode: auto            # auto | standard | enhanced
  max_workers: 4
  force_enhanced_scanned: true
  visual_batch_size: 3
  max_structure_change: 0.3

# Gemini visual correction model
reading_order:
  gemini_model: gemini-3.1-flash-lite-preview
  ollama_model: qwen2.5:7b

# Language Correction (post-processing safety net)
correction:
  enable: true
  mode: hybrid          # dictionary | llm | hybrid
  llm_provider: gemini
  dictionary_path: config/correction_dict.json
  aggressiveness: conservative

# Output Settings
output:
  html:
    simplified: true
    inline_css: true
    preserve_font_size_ratio: true
  markdown:
    table_format: pipe
    footnote_style: reference
    image_dir: images

# Model Endpoints
models:
  ollama_base_url: "http://localhost:11434"
  gemini_api_key_env: "GEMINI_API_KEY"

# User LLM Correction (optional, uses user's own API key)
# If the user provides their own LLM API key in the app settings,
# additional AI correction is applied locally on their machine.
# Supported providers: gemini, openai, claude
# Default models (latest fast models):
#   gemini:  gemini-2.5-flash-lite
#   openai:  gpt-4.1-mini
#   claude:  claude-sonnet-4-5-20250514
user_llm:
  provider: ""    # Set by user in app settings (not here)
  api_key: ""     # Set by user in app settings (not here)
  model: ""       # Empty = use default for provider

# R2 Object Storage (for hybrid image PDF upload)
# Large image PDFs bypass Railway traffic by uploading directly to R2.
# Set credentials in environment variables (see .env.example).
r2:
  bucket_name: moa-documents
  upload_expiry_seconds: 3600
  cleanup_after_hours: 24

# Credit System
credits:
  cost_markup: 2.2
  gemini_input_cost_per_million: 0.075
  gemini_output_cost_per_million: 0.30
