<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' http://127.0.0.1:*; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';">
  <title>PDF → HTML/Markdown Converter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --surface2: #0f3460;
      --primary: #e94560;
      --primary-light: #f06292;
      --text: #eee;
      --text-muted: #999;
      --success: #4caf50;
      --warning: #ff9800;
      --border: #2a2a4a;
      --radius: 8px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      -webkit-app-region: drag;
    }
    .header h1 {
      font-size: 20px;
      font-weight: 600;
    }
    .header h1 span { color: var(--primary); }
    .header-status {
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
      -webkit-app-region: no-drag;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--warning);
    }
    .status-dot.connected { background: var(--success); }

    /* Main layout */
    .main {
      display: grid;
      grid-template-columns: 300px 1fr;
      height: calc(100vh - 57px);
    }

    /* Sidebar */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 20px;
      overflow-y: auto;
    }
    .sidebar h2 {
      font-size: 14px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    /* Buttons */
    .btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      font-size: 14px;
      margin-bottom: 10px;
      transition: all 0.2s;
    }
    .btn:hover { border-color: var(--primary); background: rgba(233, 69, 96, 0.1); }
    .btn.primary {
      background: var(--primary);
      border-color: var(--primary);
      font-weight: 600;
    }
    .btn.primary:hover { background: var(--primary-light); }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Input groups */
    .input-group {
      margin-bottom: 16px;
    }
    .input-group label {
      display: block;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .input-group .path-display {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 12px;
      font-size: 13px;
      color: var(--text);
      word-break: break-all;
      min-height: 36px;
    }
    .input-group select, .input-group input {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 13px;
    }

    /* Checkboxes */
    .checkbox-group {
      display: flex;
      gap: 16px;
      margin-bottom: 12px;
    }
    .checkbox-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      cursor: pointer;
    }

    /* Content area */
    .content {
      padding: 24px;
      overflow-y: auto;
    }

    /* Job cards */
    .jobs-container {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .job-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .job-card .job-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .job-card .job-title {
      font-size: 16px;
      font-weight: 600;
    }
    .job-card .job-status {
      font-size: 13px;
      padding: 4px 10px;
      border-radius: 12px;
      font-weight: 500;
    }
    .job-status.pending { background: rgba(255,152,0,0.2); color: var(--warning); }
    .job-status.processing { background: rgba(33,150,243,0.2); color: #42a5f5; }
    .job-status.completed { background: rgba(76,175,80,0.2); color: var(--success); }
    .job-status.error { background: rgba(244,67,54,0.2); color: #ef5350; }

    /* Progress bar */
    .progress-bar {
      height: 6px;
      background: var(--bg);
      border-radius: 3px;
      overflow: hidden;
      margin: 12px 0;
    }
    .progress-bar .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      border-radius: 3px;
      transition: width 0.3s;
    }
    .job-message {
      font-size: 13px;
      color: var(--text-muted);
    }
    .job-actions {
      margin-top: 12px;
      display: flex;
      gap: 8px;
    }
    .job-actions .btn {
      width: auto;
      padding: 6px 14px;
      font-size: 13px;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .empty-state h3 {
      font-size: 18px;
      margin-bottom: 8px;
      color: var(--text);
    }

    /* Settings section */
    .settings-section {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    /* Separator */
    .sep {
      height: 1px;
      background: var(--border);
      margin: 16px 0;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <h1><span>PDF</span> → HTML / Markdown Converter</h1>
    <div class="header-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Connecting...</span>
    </div>
  </div>

  <div class="main">
    <!-- Sidebar -->
    <div class="sidebar">
      <h2>Convert</h2>

      <!-- Single file -->
      <button class="btn" id="btnSelectFile" onclick="selectFile()">
        📄 Select PDF File
      </button>
      <div class="input-group" id="filePathGroup" style="display:none">
        <label>Selected file</label>
        <div class="path-display" id="filePath"></div>
      </div>

      <div class="sep"></div>

      <!-- Batch folder -->
      <button class="btn" id="btnSelectFolder" onclick="selectFolder()">
        📁 Select Folder (Batch)
      </button>
      <div class="input-group" id="folderPathGroup" style="display:none">
        <label>Selected folder</label>
        <div class="path-display" id="folderPath"></div>
      </div>

      <div class="sep"></div>

      <!-- Output directory -->
      <button class="btn" onclick="selectOutputDir()">
        💾 Output Directory
      </button>
      <div class="input-group" id="outputDirGroup" style="display:none">
        <label>Output to</label>
        <div class="path-display" id="outputDir"></div>
      </div>

      <div class="sep"></div>

      <!-- Output formats -->
      <div class="input-group">
        <label>Output Formats</label>
        <div class="checkbox-group">
          <label><input type="checkbox" id="fmtHtml" checked> HTML</label>
          <label><input type="checkbox" id="fmtMd" checked> Markdown</label>
        </div>
      </div>

      <!-- Convert buttons -->
      <button class="btn primary" id="btnConvert" onclick="startConversion()" disabled>
        ▶ Start Conversion
      </button>

      <!-- Settings -->
      <div class="settings-section">
        <h2>Settings</h2>
        <div class="input-group">
          <label>OCR Engine</label>
          <select id="ocrEngine">
            <option value="surya">Surya (Recommended)</option>
            <option value="tesseract">Tesseract</option>
            <option value="hybrid">Hybrid</option>
          </select>
        </div>
        <div class="input-group">
          <label>Reading Order AI</label>
          <select id="readingOrderMode">
            <option value="rule_based">Rule-based (Fast)</option>
            <option value="hybrid" selected>Hybrid (Recommended)</option>
            <option value="vlm">VLM Only (High Quality)</option>
          </select>
        </div>
        <div class="input-group">
          <label>Correction Mode</label>
          <select id="correctionMode">
            <option value="dictionary">Dictionary Only (Fast)</option>
            <option value="hybrid" selected>Hybrid (Recommended)</option>
            <option value="llm">LLM Only (High Quality)</option>
          </select>
        </div>
        <div class="input-group">
          <label>Max Workers</label>
          <input type="number" id="maxWorkers" value="4" min="1" max="16">
        </div>
        <div class="input-group">
          <label>Pages per Chunk</label>
          <input type="number" id="pagesPerChunk" value="10" min="1" max="50">
        </div>
      </div>
    </div>

    <!-- Content area -->
    <div class="content">
      <div class="jobs-container" id="jobsContainer">
        <div class="empty-state" id="emptyState">
          <div class="icon">📑</div>
          <h3>No conversion jobs yet</h3>
          <p>Select a PDF file or folder to get started</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    // State
    let backendUrl = "http://127.0.0.1:8765";
    let selectedFile = null;
    let selectedFolder = null;
    let outputDirectory = null;
    let jobs = {};
    let pollIntervals = {};

    // Initialize
    async function init() {
      try {
        backendUrl = await window.electronAPI.getBackendUrl();
      } catch { /* use default */ }
      checkBackendHealth();
      setInterval(checkBackendHealth, 5000);
    }

    async function checkBackendHealth() {
      try {
        const resp = await fetch(`${backendUrl}/api/health`);
        if (resp.ok) {
          document.getElementById("statusDot").classList.add("connected");
          document.getElementById("statusText").textContent = "Backend Ready";
        }
      } catch {
        document.getElementById("statusDot").classList.remove("connected");
        document.getElementById("statusText").textContent = "Backend Offline";
      }
    }

    // File / Folder selection
    async function selectFile() {
      const path = await window.electronAPI.selectFile();
      if (path) {
        selectedFile = path;
        selectedFolder = null;
        document.getElementById("filePath").textContent = path;
        document.getElementById("filePathGroup").style.display = "block";
        document.getElementById("folderPathGroup").style.display = "none";
        updateConvertButton();
      }
    }

    async function selectFolder() {
      const path = await window.electronAPI.selectFolder();
      if (path) {
        selectedFolder = path;
        selectedFile = null;
        document.getElementById("folderPath").textContent = path;
        document.getElementById("folderPathGroup").style.display = "block";
        document.getElementById("filePathGroup").style.display = "none";
        updateConvertButton();
      }
    }

    async function selectOutputDir() {
      const path = await window.electronAPI.selectOutputDir();
      if (path) {
        outputDirectory = path;
        document.getElementById("outputDir").textContent = path;
        document.getElementById("outputDirGroup").style.display = "block";
        updateConvertButton();
      }
    }

    function updateConvertButton() {
      const hasInput = selectedFile || selectedFolder;
      const hasOutput = outputDirectory;
      document.getElementById("btnConvert").disabled = !(hasInput && hasOutput);
    }

    // Conversion
    async function startConversion() {
      const formats = [];
      if (document.getElementById("fmtHtml").checked) formats.push("html");
      if (document.getElementById("fmtMd").checked) formats.push("markdown");
      if (formats.length === 0) { alert("Select at least one output format"); return; }

      // Update settings
      await updateSettings();

      const endpoint = selectedFolder ? "/api/convert/batch" : "/api/convert";
      const body = selectedFolder
        ? { folder_path: selectedFolder, output_dir: outputDirectory, output_formats: formats }
        : { input_path: selectedFile, output_dir: outputDirectory, output_formats: formats };

      try {
        const resp = await fetch(`${backendUrl}${endpoint}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const data = await resp.json();
        addJob(data.job_id, selectedFile || selectedFolder);
      } catch (err) {
        alert("Failed to start conversion: " + err.message);
      }
    }

    async function updateSettings() {
      const settings = [
        { key: "max_workers", value: parseInt(document.getElementById("maxWorkers").value) },
        { key: "pages_per_chunk", value: parseInt(document.getElementById("pagesPerChunk").value) },
        { key: "ocr_engine", value: document.getElementById("ocrEngine").value },
        { key: "reading_order_mode", value: document.getElementById("readingOrderMode").value },
        { key: "correction_mode", value: document.getElementById("correctionMode").value },
      ];
      for (const s of settings) {
        try {
          await fetch(`${backendUrl}/api/config`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(s),
          });
        } catch { /* ignore */ }
      }
    }

    // Job management
    function addJob(jobId, inputPath) {
      document.getElementById("emptyState").style.display = "none";
      jobs[jobId] = { inputPath, status: "pending", progress: 0, message: "Queued" };
      renderJobs();
      startPolling(jobId);
    }

    function startPolling(jobId) {
      pollIntervals[jobId] = setInterval(async () => {
        try {
          const resp = await fetch(`${backendUrl}/api/jobs/${jobId}`);
          const data = await resp.json();
          jobs[jobId] = {
            ...jobs[jobId],
            status: data.status,
            progress: data.progress,
            message: data.message,
            result: data.result,
          };
          renderJobs();
          if (data.status === "completed" || data.status === "error") {
            clearInterval(pollIntervals[jobId]);
            delete pollIntervals[jobId];
          }
        } catch { /* retry */ }
      }, 1000);
    }

    function renderJobs() {
      const container = document.getElementById("jobsContainer");
      const cards = Object.entries(jobs).reverse().map(([jid, job]) => {
        const pct = Math.round(job.progress * 100);
        const filename = job.inputPath ? job.inputPath.split(/[\\/]/).pop() : "Unknown";
        const actions = job.status === "completed" && job.result
          ? `<div class="job-actions">
               <button class="btn" onclick="openOutput('${(job.result.output_dir || outputDirectory).replace(/\\/g, "\\\\")}')">📂 Open Output</button>
             </div>`
          : "";
        return `
          <div class="job-card">
            <div class="job-header">
              <div class="job-title">${filename}</div>
              <div class="job-status ${job.status}">${job.status.toUpperCase()}</div>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" style="width:${pct}%"></div>
            </div>
            <div class="job-message">${pct}% — ${job.message}</div>
            ${actions}
          </div>`;
      });

      const empty = document.getElementById("emptyState");
      if (cards.length > 0) {
        container.innerHTML = cards.join("\n");
      } else {
        container.innerHTML = "";
        container.appendChild(empty);
        empty.style.display = "block";
      }
    }

    async function openOutput(dir) {
      await window.electronAPI.openFolder(dir);
    }

    // Start
    init();
  </script>
</body>
</html>
