<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' http://127.0.0.1:* https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; img-src 'self' data: file:; font-src 'self' https://cdn.jsdelivr.net;">
  <title>HTML 에디터 - PDF 변환기</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #16213e;
      --primary: #e94560;
      --primary-light: #f06292;
      --text: #f0f0f0;
      --text-muted: #8888aa;
      --border: #2a2a4a;
      --radius: 8px;
      --transition: all 0.2s ease;
    }
    body {
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', -apple-system, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Toolbar */
    .toolbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 0 8px;
      border-right: 1px solid var(--border);
    }
    .toolbar-group:last-child { border-right: none; }
    .tb-btn {
      padding: 6px 10px;
      background: none;
      border: 1px solid transparent;
      border-radius: var(--radius);
      color: var(--text);
      cursor: pointer;
      font-size: 14px;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 32px;
      height: 32px;
    }
    .tb-btn:hover { background: var(--surface2); border-color: var(--border); }
    .tb-btn.active { background: rgba(233,69,96,0.15); border-color: var(--primary); color: var(--primary-light); }
    .tb-btn[title]:hover::after {
      content: attr(title);
      position: absolute;
      bottom: -28px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface2);
      color: var(--text);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      white-space: nowrap;
      z-index: 10;
    }
    .tb-select {
      padding: 4px 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
    }
    .tb-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-right: 4px;
    }

    /* Mode tabs */
    .mode-tabs {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      padding: 0 16px;
      flex-shrink: 0;
    }
    .mode-tab {
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: var(--transition);
    }
    .mode-tab:hover { color: var(--text); }
    .mode-tab.active { color: var(--primary-light); border-bottom-color: var(--primary); }

    /* Editor container */
    .editor-container {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Visual editor */
    .visual-editor {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      background: #ffffff;
      color: #1a1a1a;
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', serif;
      font-size: 14px;
      line-height: 1.8;
      outline: none;
    }
    .visual-editor:focus { outline: none; }
    .visual-editor table {
      border-collapse: collapse;
      width: 100%;
      margin: 16px 0;
    }
    .visual-editor table td,
    .visual-editor table th {
      border: 1px solid #ccc;
      padding: 8px 12px;
      text-align: left;
    }
    .visual-editor table th { background: #f5f5f5; font-weight: 600; }
    .visual-editor h1 { font-size: 24px; margin: 20px 0 12px; }
    .visual-editor h2 { font-size: 20px; margin: 18px 0 10px; }
    .visual-editor h3 { font-size: 17px; margin: 16px 0 8px; }
    .visual-editor p { margin: 8px 0; }
    .visual-editor blockquote {
      border-left: 3px solid #e94560;
      padding-left: 16px;
      margin: 12px 0;
      color: #555;
    }
    .visual-editor img { max-width: 100%; height: auto; }

    /* Source code editor */
    .source-editor {
      flex: 1;
      overflow-y: auto;
      display: none;
    }
    .source-editor textarea {
      width: 100%;
      height: 100%;
      padding: 16px;
      background: var(--bg);
      color: var(--text);
      border: none;
      font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.6;
      resize: none;
      outline: none;
      tab-size: 2;
    }

    /* Split view */
    .split-view {
      display: none;
      flex: 1;
      overflow: hidden;
    }
    .split-left, .split-right {
      flex: 1;
      overflow-y: auto;
    }
    .split-left { border-right: 1px solid var(--border); }
    .split-left textarea {
      width: 100%;
      height: 100%;
      padding: 16px;
      background: var(--bg);
      color: var(--text);
      border: none;
      font-family: monospace;
      font-size: 13px;
      line-height: 1.6;
      resize: none;
      outline: none;
    }
    .split-right {
      padding: 24px;
      background: #ffffff;
      color: #1a1a1a;
      font-family: 'Malgun Gothic', serif;
      font-size: 14px;
      line-height: 1.8;
    }

    /* Bottom bar */
    .bottom-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 8px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .bottom-info {
      font-size: 12px;
      color: var(--text-muted);
    }
    .bottom-actions {
      display: flex;
      gap: 8px;
    }
    .bottom-actions button {
      padding: 6px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: var(--transition);
    }
    .bottom-actions button:hover { border-color: var(--primary); }
    .bottom-actions button.primary {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }
    .bottom-actions button.primary:hover { background: var(--primary-light); }

    /* Table editor popup */
    .table-popup {
      display: none;
      position: fixed;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      z-index: 50;
    }
    .table-popup.show { display: block; }
    .table-popup label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
    .table-popup input {
      width: 60px; padding: 4px 8px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 4px; color: var(--text); font-size: 13px;
      margin-right: 8px;
    }
    .table-popup .tp-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .table-popup button {
      padding: 6px 14px;
      background: var(--primary); border: none;
      border-radius: var(--radius); color: white;
      cursor: pointer; font-size: 12px; margin-top: 4px;
    }
  </style>
</head>
<body>
  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-group">
      <span class="tb-label">서식:</span>
      <select class="tb-select" id="headingSelect" onchange="applyHeading(this.value)">
        <option value="p">본문</option>
        <option value="h1">제목 1 (H1)</option>
        <option value="h2">제목 2 (H2)</option>
        <option value="h3">제목 3 (H3)</option>
        <option value="h4">제목 4 (H4)</option>
        <option value="h5">제목 5 (H5)</option>
        <option value="h6">제목 6 (H6)</option>
      </select>
    </div>
    <div class="toolbar-group">
      <button class="tb-btn" onclick="execCmd('bold')" title="굵게 (Ctrl+B)"><b>B</b></button>
      <button class="tb-btn" onclick="execCmd('italic')" title="기울임 (Ctrl+I)"><i>I</i></button>
      <button class="tb-btn" onclick="execCmd('underline')" title="밑줄 (Ctrl+U)"><u>U</u></button>
      <button class="tb-btn" onclick="execCmd('strikeThrough')" title="취소선"><s>S</s></button>
    </div>
    <div class="toolbar-group">
      <button class="tb-btn" onclick="execCmd('justifyLeft')" title="왼쪽 정렬">&#8676;</button>
      <button class="tb-btn" onclick="execCmd('justifyCenter')" title="가운데 정렬">&#8596;</button>
      <button class="tb-btn" onclick="execCmd('justifyRight')" title="오른쪽 정렬">&#8677;</button>
    </div>
    <div class="toolbar-group">
      <button class="tb-btn" onclick="execCmd('insertUnorderedList')" title="글머리 기호">&#8226;</button>
      <button class="tb-btn" onclick="execCmd('insertOrderedList')" title="번호 매기기">1.</button>
      <button class="tb-btn" onclick="execCmd('indent')" title="들여쓰기">&#8594;</button>
      <button class="tb-btn" onclick="execCmd('outdent')" title="내어쓰기">&#8592;</button>
    </div>
    <div class="toolbar-group">
      <button class="tb-btn" onclick="showTablePopup()" title="표 삽입/수정">&#9638;</button>
      <button class="tb-btn" onclick="insertHR()" title="수평선">&#8213;</button>
      <button class="tb-btn" onclick="execCmd('formatBlock', 'blockquote')" title="인용문">&#10077;</button>
    </div>
    <div class="toolbar-group">
      <button class="tb-btn" onclick="execCmd('undo')" title="실행 취소 (Ctrl+Z)">&#8630;</button>
      <button class="tb-btn" onclick="execCmd('redo')" title="다시 실행 (Ctrl+Y)">&#8631;</button>
    </div>
    <div class="toolbar-group">
      <button class="tb-btn" onclick="addTableRow()" title="표 행 추가">+행</button>
      <button class="tb-btn" onclick="addTableCol()" title="표 열 추가">+열</button>
      <button class="tb-btn" onclick="deleteTableRow()" title="표 행 삭제">-행</button>
      <button class="tb-btn" onclick="deleteTableCol()" title="표 열 삭제">-열</button>
    </div>
  </div>

  <!-- Mode tabs -->
  <div class="mode-tabs">
    <div class="mode-tab active" onclick="switchMode('visual')">시각 편집</div>
    <div class="mode-tab" onclick="switchMode('source')">HTML 소스</div>
    <div class="mode-tab" onclick="switchMode('split')">분할 보기</div>
  </div>

  <!-- Editors -->
  <div class="editor-container">
    <div class="visual-editor" id="visualEditor" contenteditable="true">
      <h1>변환된 문서가 여기에 표시됩니다</h1>
      <p>HTML 파일을 불러오거나, 변환 결과를 여기서 편집하세요.</p>
    </div>
    <div class="source-editor" id="sourceEditor">
      <textarea id="sourceTextarea" spellcheck="false"></textarea>
    </div>
    <div class="split-view" id="splitView">
      <div class="split-left"><textarea id="splitSource" spellcheck="false"></textarea></div>
      <div class="split-right" id="splitPreview"></div>
    </div>
  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <div class="bottom-info" id="bottomInfo">문서 준비 완료</div>
    <div class="bottom-actions">
      <button onclick="loadFile()">파일 열기</button>
      <button onclick="saveAsHtml()">HTML로 저장</button>
      <button onclick="saveAsMarkdown()">Markdown으로 저장</button>
      <button class="primary" onclick="saveFile()">저장 (Ctrl+S)</button>
    </div>
  </div>

  <!-- Table insert popup -->
  <div class="table-popup" id="tablePopup">
    <div class="tp-row">
      <label>행:</label><input type="number" id="tpRows" value="3" min="1" max="50">
      <label>열:</label><input type="number" id="tpCols" value="3" min="1" max="20">
    </div>
    <button onclick="insertTable()">표 삽입</button>
  </div>

  <script>
    let currentFilePath = null;
    let currentMode = "visual";

    // ===== MODE SWITCHING =====
    function switchMode(mode) {
      currentMode = mode;
      document.querySelectorAll(".mode-tab").forEach(t => t.classList.remove("active"));
      document.getElementById("visualEditor").style.display = "none";
      document.getElementById("sourceEditor").style.display = "none";
      document.getElementById("splitView").style.display = "none";

      if (mode === "visual") {
        document.querySelectorAll(".mode-tab")[0].classList.add("active");
        document.getElementById("visualEditor").style.display = "block";
      } else if (mode === "source") {
        document.querySelectorAll(".mode-tab")[1].classList.add("active");
        document.getElementById("sourceEditor").style.display = "block";
        document.getElementById("sourceTextarea").value = document.getElementById("visualEditor").innerHTML;
      } else {
        document.querySelectorAll(".mode-tab")[2].classList.add("active");
        document.getElementById("splitView").style.display = "flex";
        document.getElementById("splitSource").value = document.getElementById("visualEditor").innerHTML;
        document.getElementById("splitPreview").innerHTML = document.getElementById("visualEditor").innerHTML;
      }
    }

    // Sync source → visual when switching back
    document.getElementById("sourceTextarea").addEventListener("input", function() {
      document.getElementById("visualEditor").innerHTML = this.value;
    });
    document.getElementById("splitSource").addEventListener("input", function() {
      document.getElementById("splitPreview").innerHTML = this.value;
      document.getElementById("visualEditor").innerHTML = this.value;
    });

    // ===== COMMANDS =====
    function execCmd(cmd, value) {
      document.execCommand(cmd, false, value || null);
      document.getElementById("visualEditor").focus();
    }

    function applyHeading(tag) {
      if (tag === "p") {
        execCmd("formatBlock", "p");
      } else {
        execCmd("formatBlock", tag);
      }
    }

    function insertHR() {
      execCmd("insertHorizontalRule");
    }

    // ===== TABLE OPERATIONS =====
    function showTablePopup() {
      const popup = document.getElementById("tablePopup");
      popup.classList.toggle("show");
      popup.style.top = "120px";
      popup.style.left = "50%";
      popup.style.transform = "translateX(-50%)";
    }

    function insertTable() {
      const rows = parseInt(document.getElementById("tpRows").value) || 3;
      const cols = parseInt(document.getElementById("tpCols").value) || 3;
      let html = '<table><thead><tr>';
      for (let c = 0; c < cols; c++) html += `<th>헤더 ${c+1}</th>`;
      html += '</tr></thead><tbody>';
      for (let r = 0; r < rows - 1; r++) {
        html += '<tr>';
        for (let c = 0; c < cols; c++) html += '<td>&nbsp;</td>';
        html += '</tr>';
      }
      html += '</tbody></table>';
      execCmd("insertHTML", html);
      document.getElementById("tablePopup").classList.remove("show");
    }

    function getSelectedTable() {
      const sel = window.getSelection();
      if (!sel.rangeCount) return null;
      let node = sel.anchorNode;
      while (node && node !== document.getElementById("visualEditor")) {
        if (node.tagName === "TABLE") return node;
        if (node.tagName === "TD" || node.tagName === "TH") return node.closest("table");
        node = node.parentNode;
      }
      return null;
    }

    function getSelectedCell() {
      const sel = window.getSelection();
      if (!sel.rangeCount) return null;
      let node = sel.anchorNode;
      while (node) {
        if (node.tagName === "TD" || node.tagName === "TH") return node;
        node = node.parentNode;
      }
      return null;
    }

    function addTableRow() {
      const table = getSelectedTable();
      if (!table) return;
      const cell = getSelectedCell();
      const row = cell ? cell.parentElement : table.rows[table.rows.length - 1];
      const newRow = row.cloneNode(true);
      Array.from(newRow.cells).forEach(c => { c.innerHTML = "&nbsp;"; });
      row.parentNode.insertBefore(newRow, row.nextSibling);
    }

    function addTableCol() {
      const table = getSelectedTable();
      if (!table) return;
      const cell = getSelectedCell();
      const colIdx = cell ? cell.cellIndex + 1 : -1;
      for (const row of table.rows) {
        const newCell = document.createElement(row.parentElement.tagName === "THEAD" ? "th" : "td");
        newCell.innerHTML = "&nbsp;";
        if (colIdx >= 0 && colIdx < row.cells.length) {
          row.insertBefore(newCell, row.cells[colIdx]);
        } else {
          row.appendChild(newCell);
        }
      }
    }

    function deleteTableRow() {
      const cell = getSelectedCell();
      if (!cell) return;
      const row = cell.parentElement;
      const table = row.closest("table");
      if (table.rows.length <= 1) { table.remove(); return; }
      row.remove();
    }

    function deleteTableCol() {
      const cell = getSelectedCell();
      if (!cell) return;
      const table = cell.closest("table");
      const colIdx = cell.cellIndex;
      for (const row of table.rows) {
        if (row.cells[colIdx]) row.deleteCell(colIdx);
      }
      if (table.rows[0] && table.rows[0].cells.length === 0) table.remove();
    }

    // ===== FILE OPERATIONS =====
    async function loadFile() {
      const path = await window.electronAPI.selectHtmlFile();
      if (!path) return;
      const content = await window.electronAPI.readFile(path);
      if (content !== null) {
        currentFilePath = path;
        if (path.endsWith(".html") || path.endsWith(".htm")) {
          // Extract body content if full HTML document
          const match = content.match(/<body[^>]*>([\s\S]*)<\/body>/i);
          document.getElementById("visualEditor").innerHTML = match ? match[1] : content;
        } else {
          document.getElementById("visualEditor").innerText = content;
        }
        document.getElementById("bottomInfo").textContent = `열림: ${path.split(/[\\/]/).pop()}`;
      }
    }

    async function saveFile() {
      if (!currentFilePath) {
        await saveAsHtml();
        return;
      }
      const content = getFullHtml();
      const ok = await window.electronAPI.saveFile(currentFilePath, content);
      document.getElementById("bottomInfo").textContent = ok ? "저장 완료!" : "저장 실패";
    }

    async function saveAsHtml() {
      const name = currentFilePath ? currentFilePath.split(/[\\/]/).pop().replace(/\.\w+$/, ".html") : "output.html";
      const path = await window.electronAPI.saveFileDialog(name, [
        { name: "HTML Files", extensions: ["html", "htm"] },
      ]);
      if (!path) return;
      const content = getFullHtml();
      const ok = await window.electronAPI.saveFile(path, content);
      if (ok) {
        currentFilePath = path;
        document.getElementById("bottomInfo").textContent = `HTML 저장 완료: ${path.split(/[\\/]/).pop()}`;
      }
    }

    async function saveAsMarkdown() {
      const name = currentFilePath ? currentFilePath.split(/[\\/]/).pop().replace(/\.\w+$/, ".md") : "output.md";
      const path = await window.electronAPI.saveFileDialog(name, [
        { name: "Markdown Files", extensions: ["md"] },
      ]);
      if (!path) return;
      const md = htmlToMarkdown(document.getElementById("visualEditor").innerHTML);
      const ok = await window.electronAPI.saveFile(path, md);
      if (ok) {
        document.getElementById("bottomInfo").textContent = `Markdown 저장 완료: ${path.split(/[\\/]/).pop()}`;
      }
    }

    function getFullHtml() {
      const body = document.getElementById("visualEditor").innerHTML;
      return `<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>
<style>
body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; line-height: 1.8; max-width: 900px; margin: 0 auto; padding: 24px; color: #1a1a1a; }
table { border-collapse: collapse; width: 100%; margin: 16px 0; }
td, th { border: 1px solid #ccc; padding: 8px 12px; }
th { background: #f5f5f5; font-weight: 600; }
h1 { font-size: 24px; margin: 20px 0 12px; }
h2 { font-size: 20px; margin: 18px 0 10px; }
h3 { font-size: 17px; margin: 16px 0 8px; }
blockquote { border-left: 3px solid #e94560; padding-left: 16px; margin: 12px 0; color: #555; }
img { max-width: 100%; }
</style>
</head>
<body>
${body}
</body>
</html>`;
    }

    // ===== HTML → MARKDOWN CONVERTER =====
    function htmlToMarkdown(html) {
      let md = html;
      // Headings
      md = md.replace(/<h1[^>]*>(.*?)<\/h1>/gi, '# $1\n\n');
      md = md.replace(/<h2[^>]*>(.*?)<\/h2>/gi, '## $1\n\n');
      md = md.replace(/<h3[^>]*>(.*?)<\/h3>/gi, '### $1\n\n');
      md = md.replace(/<h4[^>]*>(.*?)<\/h4>/gi, '#### $1\n\n');
      md = md.replace(/<h5[^>]*>(.*?)<\/h5>/gi, '##### $1\n\n');
      md = md.replace(/<h6[^>]*>(.*?)<\/h6>/gi, '###### $1\n\n');
      // Bold/Italic
      md = md.replace(/<(strong|b)>(.*?)<\/(strong|b)>/gi, '**$2**');
      md = md.replace(/<(em|i)>(.*?)<\/(em|i)>/gi, '*$2*');
      md = md.replace(/<u>(.*?)<\/u>/gi, '<u>$1</u>');
      md = md.replace(/<s>(.*?)<\/s>/gi, '~~$1~~');
      // Line breaks
      md = md.replace(/<br\s*\/?>/gi, '\n');
      md = md.replace(/<hr\s*\/?>/gi, '\n---\n\n');
      // Paragraphs
      md = md.replace(/<p[^>]*>(.*?)<\/p>/gi, '$1\n\n');
      // Blockquote
      md = md.replace(/<blockquote[^>]*>(.*?)<\/blockquote>/gi, '> $1\n\n');
      // Lists
      md = md.replace(/<li[^>]*>(.*?)<\/li>/gi, '- $1\n');
      md = md.replace(/<\/?[uo]l[^>]*>/gi, '\n');
      // Links
      md = md.replace(/<a[^>]*href="([^"]*)"[^>]*>(.*?)<\/a>/gi, '[$2]($1)');
      // Images
      md = md.replace(/<img[^>]*src="([^"]*)"[^>]*alt="([^"]*)"[^>]*\/?>/gi, '![$2]($1)');
      md = md.replace(/<img[^>]*src="([^"]*)"[^>]*\/?>/gi, '![]($1)');
      // Tables (basic conversion)
      md = md.replace(/<table[^>]*>([\s\S]*?)<\/table>/gi, function(match, content) {
        return convertTableToMd(content);
      });
      // Strip remaining tags
      md = md.replace(/<[^>]+>/g, '');
      // Clean up
      md = md.replace(/&nbsp;/g, ' ');
      md = md.replace(/&lt;/g, '<');
      md = md.replace(/&gt;/g, '>');
      md = md.replace(/&amp;/g, '&');
      md = md.replace(/\n{3,}/g, '\n\n');
      return md.trim() + '\n';
    }

    function convertTableToMd(tableHtml) {
      const div = document.createElement('div');
      div.innerHTML = '<table>' + tableHtml + '</table>';
      const table = div.querySelector('table');
      if (!table || !table.rows.length) return '';

      const rows = [];
      for (const row of table.rows) {
        const cells = [];
        for (const cell of row.cells) {
          cells.push(cell.textContent.trim().replace(/\|/g, '\\|'));
        }
        rows.push(cells);
      }

      if (!rows.length) return '';

      let md = '\n';
      // Header row
      md += '| ' + rows[0].join(' | ') + ' |\n';
      md += '|' + rows[0].map(() => '---').join('|') + '|\n';
      // Data rows
      for (let i = 1; i < rows.length; i++) {
        md += '| ' + rows[i].join(' | ') + ' |\n';
      }
      md += '\n';
      return md;
    }

    // ===== KEYBOARD SHORTCUTS =====
    document.addEventListener("keydown", (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === "s") {
        e.preventDefault();
        saveFile();
      }
    });

    // ===== INIT: Load file from URL params =====
    async function initEditor() {
      const params = new URLSearchParams(window.location.search);
      const filePath = params.get("file");
      if (filePath) {
        const content = await window.electronAPI.readFile(filePath);
        if (content !== null) {
          currentFilePath = filePath;
          const match = content.match(/<body[^>]*>([\s\S]*)<\/body>/i);
          document.getElementById("visualEditor").innerHTML = match ? match[1] : content;
          document.getElementById("bottomInfo").textContent = `열림: ${filePath.split(/[\\/]/).pop()}`;
        }
      }
    }

    initEditor();
  </script>
</body>
</html>
